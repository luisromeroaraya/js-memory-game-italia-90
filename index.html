<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Italia '90 Memory Game</title>
</head>
<body>
    <!-- Sidebar with stats, controls, and player list -->
    <div class="game-layout">
        <aside class="sidebar">
            <h1>Italia '90<br>Memory Game</h1>
            <div class="stats">
                <div class="stat-row">
                    <span class="stat-label">Moves</span>
                    <span class="stat-value" id="moves">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Time</span>
                    <span class="stat-value" id="timer">00:00</span>
                </div>
                <button id="restart">Restart</button>
            </div>
            <div class="player-list">
                <h3>Players</h3>
                <ul>
                    <li style="--img: url('https://www.coleka.com/media/item/202005/28/italia-90-world-cup-diego-armando-maradona-argentina-128_vpd4j.webp')">Maradona</li>
                    <li style="--img: url('https://www.coleka.com/media/item/202203/05/italia-90-world-cup-roberto-baggio-italia-053.webp')">Baggio</li>
                    <li style="--img: url('https://www.coleka.com/media/item/202005/27/italia-90-world-cup-romario-brasil-208_rm4ux.webp')">Romário</li>
                    <li style="--img: url('https://www.coleka.com/media/item/202005/28/italia-90-world-cup-lothar-matthaus-deutschland-brd-259_7amc5.webp')">Matthäus</li>
                    <li style="--img: url('https://www.coleka.com/media/item/202203/05/italia-90-world-cup-carlos-alberto-valderrama-colombia-300.webp')">Valderrama</li>
                    <li style="--img: url('https://www.coleka.com/media/item/202005/28/italia-90-world-cup-marco-van-basten-nederland-417_hrk7w.webp')">Van Basten</li>
                    <li style="--img: url('https://www.coleka.com/media/item/202112/24/italia-90-world-cup-enzo-francescoli-uruguay-379.webp')">Francescoli</li>
                    <li style="--img: url('https://www.coleka.com/media/item/202112/24/italia-90-world-cup-vincenzo-scifo-belgique-belgie-338.webp')">Scifo</li>
                </ul>
            </div>
        </aside>

        <!-- 4 rows × 4 cards = 16-card grid, populated by script.js -->
        <main class="grid">
            <section class="column">
                <div class="row"></div>
                <div class="row"></div>
                <div class="row"></div>
                <div class="row"></div>
            </section>
        </main>
    </div>

    <!-- Hidden win overlay, revealed when all pairs are matched -->
    <div id="wins" class="modal hidden">
        <h2>YOU WIN!</h2>
        <div class="win-stats">
            Moves: <span id="win-moves"></span> &middot;
            Time: <span id="win-time"></span>
        </div>
        <button id="play-again">Play Again</button>
    </div>

    <!-- Confetti container for win animation -->
    <div id="confetti"></div>

    <script src="script.js"></script>
</body>
</html>
