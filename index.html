<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Italia '90 Memory Game</title>
</head>
<body>
    <!-- Title and stats -->
    <header class="column">
        <h1>Italia '90 Memory Game</h1>
        <div class="stats">
            <span>Moves: <span id="moves">0</span></span>
            <span>Time: <span id="timer">00:00</span></span>
            <button id="restart">Restart</button>
        </div>
    </header>

    <!-- 4 rows × 4 cards = 16-card grid, populated by script.js -->
    <section class="column">
        <div class="row"></div>
        <div class="row"></div>
        <div class="row"></div>
        <div class="row"></div>
    </section>

    <!-- Hidden win overlay, revealed when all pairs are matched -->
    <div id="wins" class="modal hidden">
        <h2>YOU WIN!</h2>
        <button id="play-again">Play Again</button>
    </div>

    <!-- Confetti container for win animation -->
    <div id="confetti"></div>

    <script src="script.js"></script>
</body>
</html>
